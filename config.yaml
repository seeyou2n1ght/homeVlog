# ==========================================
# HomeVlog 运行配置 (V2.3 异构并行版)
# 基于 config.example.yaml 模板修改。
# ==========================================

# 1. 环境与路径 (推荐使用绝对路径)
paths:
  nas_input: "./inputs"             # 监控素材源路径
  local_output: "./outputs"         # 浓缩视频输出目录
  sqlite_db: "./data/homevlog.db"   # 数据库存放路径

# 2. SMB 探测策略 (用于锁定正在写入的热文件)
scanner:
  write_detect_interval_sec: 2               # 两次探测的间隔时长 (秒) [测试时设短]
  write_detect_stable_count: 1               # 连续采样不变次数 [测试时设 1，生产改为 2]
  file_pattern: "*.mp4"                      # 支持扫描的文件后缀

# 3. 动态帧检测与算法参数
detection:
  model_path: "./models/yolo11s.engine"      # TensorRT 引擎路径
  classes: ["person", "baby", "cat", "dog"]  # 感兴趣的目标类别
  confidence_threshold: 0.50                 # YOLO 检出置信度红线
  iou_threshold: 0.80                        # 目标追踪的 IoU 匹配阈值
  debounce_frames: 5                         # 状态防抖窗口帧数
  static_interval_ms: 60000                  # 脉冲抽稀间隔 (毫秒)
  fps: 5                                     # 解码抽帧帧率
  infer_resolution: 640                      # 推理分辨率 (与 engine 编译尺寸一致)
  
# 4. 视频切割与合成参数
cutting:
  keyframe_padding_ms: 2500                  # 切割时前后向外扩充的宽容度
  io_timeout_sec: 30                         # 管道读取超时阈值
  parallel_jobs: 4                           # 并发切割线程数

# 5. 硬件加速调优 (生产级关键节点)
hardware:
  use_mock: false                            # 是否开启 Mock 伪造后端 (仅开发环境为 true)
  ffmpeg_hwaccel: "qsv"                      # 解码器：qsv(核显) / cuda(独显) / none(软解)100% 专注推理
  batch_size: 12                             # TensorRT 推理批次大小（与 engine 编译 batch=12 一致）
  gpu_id: 0                                  # 默认使用的 NVIDIA GPU 索引
