# HomeVlog 全局配置文件 (冒烟测试专用版)

# 1. 环境与路径
paths:
  nas_input: "D:\\code\\homevlog\\test_input"
  local_output: "D:\\code\\homevlog\\test_output"
  sqlite_db: "D:\\code\\homevlog\\data\\homevlog.db"

# 2. SMB 探测策略
scanner:
  write_detect_interval_sec: 2
  write_detect_stable_count: 1         # 测试模式：只要扫描到就立即处理
  file_pattern: "*.mp4"

# 3. 动态帧检测与算法参数
detection:
  model_path: "./models/yolov11s.trt"  # Mock 模式下此路径仅占位
  classes: ["person", "baby", "cat", "dog"]
  confidence_threshold: 0.5
  iou_threshold: 0.80
  debounce_frames: 10                  # 稍微增加去抖，观察 Mock 状态机流转
  static_interval_ms: 10000            # 静止期脉冲采样间隔缩短到 10s，便于快速观察结果
  fps: 5                               # FFmpeg 底层强制抽帧率
  infer_resolution: 640                # FFmpeg 底层强制缩放分辨率
  
# 4. 视频切割与合成参数
cutting:
  keyframe_padding_ms: 2500
  io_timeout_sec: 30
  parallel_jobs: 4                     # 并发物理切割的线程数

# 5. 硬件加速调优
hardware:
  use_mock: true                       # 强制开启 MockHAL
  ffmpeg_hwaccel: "none"               # Mock 模式下不使用硬件解码加速
  batch_size: 1
  gpu_id: 0
