# ==========================================
# HomeVlog 全局配置模板 (V2.4 异构并行版)
# 使用说明: 复制为 config.yaml，按实际环境修改参数。
# ==========================================

# 1. 路径配置
paths:
  nas_input: "./inputs"             # 监控素材源路径（生产环境建议挂载为本地盘符）
  local_output: "./outputs"         # 浓缩视频输出目录
  sqlite_db: "./data/homevlog.db"   # 数据库存放路径

# 2. 文件扫描策略（防读取正在写入的热文件）
scanner:
  write_detect_interval_sec: 5      # 两次采样间隔（秒）
  write_detect_stable_count: 2      # 连续 N 次不变视为写入完成
  file_pattern: "*.mp4"             # 扫描的文件后缀

# 3. 检测与算法参数
detection:
  model_path: "./models/yolo11s.engine"     # TensorRT engine 路径（需目标机器编译）
  classes: ["person", "baby", "cat", "dog"] # 感兴趣的目标类别
  confidence_threshold: 0.50                # YOLO 检出置信度阈值
  iou_threshold: 0.80                       # 追踪匹配的 IoU 阈值
  debounce_frames: 5                        # 状态防抖窗口（帧数）
  static_interval_ms: 60000                 # 静止期脉冲采样间隔（毫秒）
  fps: 5                                    # 解码抽帧帧率（越低越快）
  infer_resolution: 640                     # 推理分辨率（必须与 engine 编译尺寸一致）
  enable_pixel_motion: false                # 启用自适应分块帧差法
  pixel_motion_grid: 16                     # 宏块大小 (16x16)
  pixel_motion_history_size: 20             # 背景建模帧数 (约 4 秒 @ 5fps)
  pixel_motion_threshold_factor: 2.5        # 噪声阈值乘数 k

# 4. 视频切割参数
cutting:
  keyframe_padding_ms: 2500                 # -c copy 关键帧宽容补偿（前后各扩充）
  io_timeout_sec: 30                        # FFmpeg 管道超时阈值（秒）
  parallel_jobs: 4                          # 并发切割线程数

# 5. 硬件加速
hardware:
  use_mock: false                           # Mock 模式（仅开发机无 GPU 时为 true）
  ffmpeg_hwaccel: "qsv"                     # 解码器：qsv(核显) / cuda(独显) / none(软解)
  batch_size: 12                            # TRT batch（必须与 engine 编译 batch 一致）
  gpu_id: 0                                 # NVIDIA GPU 索引
